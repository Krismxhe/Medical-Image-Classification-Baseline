# ResNet-50  — reliable CNN baseline
data:
  root: "/path/to/dataset"
  img_size: 224
  use_clahe: true

model:
  name: "resnet50"
  pretrained: true
  drop_rate: 0.2

train:
  epochs: 100
  batch_size: 64
  amp: true

optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 0.05

scheduler:
  name: "cosine"
  warmup_epochs: 5

loss:
  name: "label_smoothing"
  label_smoothing: 0.1
  use_class_weights: true

logging:
  exp_name: "resnet50"
