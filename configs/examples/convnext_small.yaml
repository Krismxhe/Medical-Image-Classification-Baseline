# ConvNeXt-Small  — modern pure-CNN, often outperforms ViT on medical tasks
data:
  root: "/path/to/dataset"
  img_size: 224
  use_clahe: true

model:
  name: "convnext_small"
  pretrained: true
  drop_path_rate: 0.3

train:
  epochs: 100
  batch_size: 32
  grad_accum_steps: 2
  amp: true

optimizer:
  name: "adamw"
  lr: 5.0e-5
  weight_decay: 0.05

scheduler:
  name: "cosine"
  warmup_epochs: 10

loss:
  name: "label_smoothing"
  label_smoothing: 0.1
  use_class_weights: true

logging:
  exp_name: "convnext_small"
